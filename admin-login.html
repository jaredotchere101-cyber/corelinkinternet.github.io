<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | DataStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">CoreLink Internet <span class="brand-accent">Link</span></a>
      <nav>
        <a href="index.html">Home</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <section class="login-card card">
      <h1>Admin Login</h1>
      <p>Enter your admin credentials to access the order dashboard.</p>
      <form id="admin-login-form" class="checkout-form">
        <label for="admin-password">Admin Password</label>
        <input id="admin-password" type="password" placeholder="Enter admin password" required />

        <button type="submit">Login</button>
        <p id="login-error" class="status-result"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Admin access only. Secure login required.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
