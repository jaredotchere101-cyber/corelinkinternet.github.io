"email" must be a valid email"email" must be a valid email<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | DataStore</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">CoreLink Internet <span class="brand-accent">Link</span></a>
      <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Packages</a>
        <a href="status.html">Track Order</a>
      </nav>
    </div>
  </header>

  <main class="container main-content">
    <section class="checkout-card card">
      <h1 id="checkout-title">Checkout</h1>
      <div id="checkout-package-summary" class="package-summary"></div>
      <form id="checkout-form" class="checkout-form">
        <label for="beneficiary-number">Beneficiary Number</label>
        <input id="beneficiary-number" type="text" placeholder="Enter beneficiary phone number" required />

        <label for="contact-number">Contact Number</label>
        <input id="contact-number" type="text" placeholder="Enter your contact phone number" required />

        <label for="customer-email">Email Address</label>
        <input id="customer-email" type="email" placeholder="Enter your email address" required />

        <button id="checkout-button" type="submit">Proceed to Payment</button>
        <p class="payment-note">You will be redirected to Paystack to confirm payment.</p>
      </form>
      <p id="checkout-error" class="status-result"></p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Provide beneficiary and contact numbers before payment completes.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
